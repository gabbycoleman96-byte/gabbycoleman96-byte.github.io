<!DOCTYPE html>
<!-- GitHub Pages shows this page when someone visits an address that
     doesn't exist. It's kept simple and self-contained on purpose. -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page not found</title>
  <meta name="robots" content="noindex" />
  <!-- Same security/rendering hints as index.html (this page is self-contained). -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; base-uri 'self'; object-src 'none'" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <meta name="color-scheme" content="light dark" />
  <link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml" />
  <script>
    // Match the visitor's light/dark preference so there's no white flash.
    try {
      var d = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
      document.documentElement.setAttribute("data-theme", d ? "dark" : "light");
    } catch (e) {}
  </script>
  <style>
    :root { --bg:#ffffff; --text:#0f172a; --muted:#64748b; --accent:#4f46e5; }
    :root[data-theme="dark"] { --bg:#0b1120; --text:#e6edf6; --muted:#94a3b8; --accent:#a5b4fc; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center; text-align: center;
      padding: 2rem; background: var(--bg); color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }
    .code { font-size: clamp(4rem, 20vw, 8rem); font-weight: 800; letter-spacing: -0.04em; color: var(--accent); line-height: 1; }
    h1 { font-size: 1.5rem; margin: 0.5rem 0 0; }
    p { color: var(--muted); max-width: 40ch; margin: 0.75rem auto 1.75rem; }
    a {
      display: inline-block; padding: 0.7rem 1.2rem; border-radius: 999px;
      background: var(--accent); color: #fff; text-decoration: none; font-weight: 600;
    }
  </style>
</head>
<body>
  <main>
    <div class="code">404</div>
    <h1>This page wandered off.</h1>
    <p>The page you're looking for doesn't exist or may have moved.</p>
    <a href="./">Back to home</a>
  </main>
</body>
</html>
